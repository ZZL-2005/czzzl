retry:
  max_retries: 3
  backoff_strategy: "exponential"
  initial_delay_seconds: 2
  max_delay_seconds: 60
  retry_on_status_codes: [429, 500, 502, 503, 504]

polling:
  score_check_interval_seconds: 10
  score_check_timeout_seconds: 600

limits:
  max_token_per_task: 50000
  max_feedback_rounds: 2

retrieval:
  enabled: true
  max_results_per_source: 10
  max_papers_to_use: 5
  enable_deep_read: true
  max_context_chars: 4000
  timeout_seconds: 30

reader:
  chunk_size_chars: 3000
  max_chunks: 8
  context_window_chunks: 2

logging:
  level: "DEBUG"
  log_dir: "logs"
  save_full_responses: true

monitor:
  leaderboard_interval_seconds: 300
  bounty_check_interval_seconds: 60
